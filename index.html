<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&P PROTEIN CLUB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        /* 전체 브라우저 화면 리셋 및 아이패드 강제 맞춤 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0b0f19; 
            color: #f3f4f6; 
            -webkit-tap-highlight-color: transparent;
            padding: 16px;
            max-width: 450px;
            margin: 0 auto;
            padding-bottom: 110px; /* 하단 바와 안 겹치게 여백 확보 */
        }
        
        /* 헤더 스타일 */
        header { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 24px; border-b: 1px solid #1f2937; padding-bottom: 16px; }
        .logo-title { text-transform: uppercase; letter-spacing: 0.05em; font-size: 28px; font-weight: 900; color: #34d399; line-height: 1; }
        .logo-sub { text-transform: uppercase; letter-spacing: 0.2em; font-size: 11px; font-weight: 700; color: #9ca3af; margin-top: 4px; }
        .welcome-box { text-align: right; }
        .welcome-sub { font-size: 11px; color: #9ca3af; }
        .welcome-main { font-weight: 800; font-size: 14px; color: #34d399; margin-top: 2px; }

        /* 페이지 스위칭 레이아웃 */
        .app-page { display: none !important; width: 100% !important; }
        .app-page.active { display: block !important; animation: fadeIn 0.15s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 공통 카드 디자인 */
        .card-container {
            background: linear-gradient(135deg, #064e3b 0%, #111827 100%);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .card-sub-container {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* 배지 스타일 */
        .badge-daily { position: absolute; top: 0; right: 0; background-color: #10b981; color: #030712; font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 4px 12px; border-bottom-left-radius: 12px; letter-spacing: 0.05em; }
        .badge-assured { position: absolute; top: 0; right: 0; background-color: #f59e0b; color: #030712; font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-bottom-left-radius: 12px; letter-spacing: 0.05em; }
