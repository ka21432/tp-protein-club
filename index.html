<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&P PROTEIN CLUB</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .nav-btn:active { transform: scale(0.9); transition: 0.1s; }
        .app-page { display: none; }
        .app-page.active { display: block; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-32">

    <header class="flex justify-between items-center my-6 border-b border-gray-800 pb-4">
        <div>
            <h1 class="text-3xl font-black tracking-tight text-emerald-400">T&P</h1>
            <p class="text-xs uppercase tracking-widest text-gray-400 font-bold">Protein Club</p>
        </div>
        <div class="text-right">
            <span class="text-xs text-gray-400">Welcome back,</span>
            <p class="font-extrabold text-sm text-emerald-400">GYM RAT 🔥</p>
        </div>
    </header>

    <main id="page-home" class="app-page active">
        <section class="bg-gray-900 border border-gray-800 rounded-2xl p-5 mb-6 shadow-xl">
            <h2 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Monthly Protein Intake Goal</h2>
            <div class="flex items-baseline space-x-2">
                <span id="total-protein" class="text-5xl font-black text-white">0</span>
                <span class="text-xl font-bold text-emerald-400">/ 3000g</span>
            </div>
            <div class="w-full bg-gray-800 h-3 rounded-full mt-4 overflow-hidden">
                <div id="protein-progress" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </p>
        </section>
        <div class="bg-gray-900/50 border border-gray-800 rounded-xl p-4 text-center text-sm text-gray-400">
            👋 Tap <span class="text-emerald-400 font-bold">"Order"</span> below to schedule your subscription.
        </div>
    </main>

    <main id="page-order" class="app-page">
        <section class="bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-xl">
            <h2 class="text-lg font-bold text-white mb-4 border-b border-gray-800 pb-2">Order & Schedule Pickup</h2>
            <form id="order-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Select Your Plan</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="border border-gray-700 rounded-xl p-3 flex flex-col justify-between cursor-pointer hover:border-emerald-500 transition has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-950/20">
                            <input type="radio" name="plan" value="5" checked class="sr-only">
                            <span class="font-bold text-sm text-white">5-Day Plan</span>
                            <span class="text-xs text-emerald-400 font-bold mt-1">$42 / wk</span>
                        </label>
                        <label class="border border-gray-700 rounded-xl p-3 flex flex-col justify-between cursor-pointer hover:border-emerald-500 transition has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-950/20">
                            <input type="radio" name="plan" value="7" class="sr-only">
                            <span class="font-bold text-sm text-white">7-Day Plan</span>
                            <span class="text-xs text-emerald-400 font-bold mt-1">$59 / wk</span>
                        </label>
                    </div>
                </div>

                <div class="flex items-center justify-between border border-gray-800 p-3 rounded-xl bg-gray-950/40">
                    <div>
                        <p class="text-sm font-bold text-white">Add Carbs (1kg Rice)</p>
                        <p class="text-xs text-gray-400">Bulk container included</p>
                    </div>
                    <input type="checkbox" id="carb-option" class="w-5 h-5 accent-emerald-500 rounded cursor-pointer">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Choose Sunday Pickup Date</label>
                    <input type="date" id="pickup-date" required class="w-full bg-gray-950 border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500 [color-scheme:dark]">
                </div>

                <button type="submit" class="w-full bg-emerald-500 text-gray-950 font-black py-4 rounded-xl hover:bg-emerald-400 transition cursor-pointer shadow-lg shadow-emerald-500/20 uppercase tracking-wider text-sm">
                    Proceed to Secure Checkout
                </button>
            </form>
        </section>
    </main>

    <main id="page-history" class="app-page">
        <section class="bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-xl">
            <h2 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">My Pickup History</h2>
            <div id="order-history-list" class="space-y-3 text-sm">
                <p class="text-gray-500 text-xs text-center py-4">No active orders found.</p>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-950 border-t border-gray-800 max-w-md mx-auto px-6 py-4 flex justify-around z-50">
        <button type="button" onclick="switchPage('home')" id="btn-home" class="nav-btn flex flex-col items-center text-emerald-400 font-bold text-xs">
            <span class="text-lg">🏠</span><span class="mt-1">Home</span>
        </button>
        <button type="button" onclick="switchPage('order')" id="btn-order" class="nav-btn flex flex-col items-center text-gray-400 text-xs font-bold">
            <span class="text-lg">🥩</span><span class="mt-1">Order</span>
        </button>
        <button type="button" onclick="switchPage('history')" id="btn-history" class="nav-btn flex flex-col items-center text-gray-400 text-xs font-bold">
            <span class="text-lg">📊</span><span class="mt-1">History</span>
        </button>
    </nav>

    <script>
        function switchPage(pageId) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-emerald-400', 'font-bold');
                b.classList.add('text-gray-400');
            });
            document.getElementById('page-' + pageId).classList.add('active');
            const targetBtn = document.getElementById('btn-' + pageId);
            targetBtn.classList.remove('text-gray-400');
            targetBtn.classList.add('text-emerald-400', 'font-bold');
        }

        const orderForm = document.getElementById('order-form');
        const totalProteinEl = document.getElementById('total-protein');
        const progressEl = document.getElementById('protein-progress');
        const historyListEl = document.getElementById('order-history-list');
        const pickupDateInput = document.getElementById('pickup-date');

        pickupDateInput.min = new Date().toISOString().split('T')[0];

        let appState = JSON.parse(localStorage.getItem('tp_protein_club_state')) || { totalProtein: 0, orders: [] };

        function updateUI() {
            totalProteinEl.textContent = appState.totalProtein;
            progressEl.style.width = Math.min((appState.totalProtein / 3000) * 100, 100) + '%';
            if (appState.orders.length === 0) {
                historyListEl.innerHTML = `<p class="text-gray-500 text-xs text-center py-4">No active orders found.</p>`;
                return;
            }
            historyListEl.innerHTML = appState.orders.map(o => `
                <div class="flex justify-between items-center border-b border-gray-800 pb-3 last:border-0 last:pb-0">
                    <div>
                        <p class="font-bold text-gray-200">${o.plan === '5' ? '5-Day Intensive Plan' : '7-Day Full-Week Fuel'}</p>
                        <p class="text-xs text-gray-500">Pickup: <span class="text-emerald-400 font-semibold">${o.date}</span> ${o.carb ? ' | 🍚 Rice Added' : ''}</p>
                    </div>
                    <div class="text-right"><span class="inline-block bg-emerald-950 text-emerald-400 text-xs font-bold px-2 py-1 rounded border border-emerald-900/50">+${o.proteinGained}g</span></div>
                </div>
            `).join('');
        }

        orderForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const selectedPlan = document.querySelector('input[name="plan"]:checked').value;
            const carbChecked = document.getElementById('carb-option').checked;
            const chosenDate = pickupDateInput.value;
            const proteinGained = parseInt(selectedPlan) * 100;

            appState.orders.unshift({ plan: selectedPlan, carb: carbChecked, date: chosenDate, proteinGained: proteinGained });
            appState.totalProtein += proteinGained;
            localStorage.setItem('tp_protein_club_state', JSON.stringify(appState));
            updateUI();

            const links = { plan5: "https://square.link/u/Tmmkg1zJ", plan7: "https://square.link/u/n19ZUye1", rice: "https://square.link/u/yaMSfwWl" };
            if (carbChecked) {
                alert("🍚 Rice option selected! opening checkout...");
                window.open(links.rice, '_blank'); 
                window.location.href = selectedPlan === "5" ? links.plan5 : links.plan7;
            } else {
                window.location.href = selectedPlan === "5" ? links.plan5 : links.plan7;
            }
        });
        updateUI();
    </script>
</body>
</html>
